services:
  - type: web
    name: modular-rag-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGINS
        value: "*" # We can restrict this later, but * ensures the Vercel frontend can connect immediately.
      - key: GROQ_API_KEY
        sync: false # Render will prompt you to enter this securely in the dashboard
